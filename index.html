<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarBucks</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>

    <img src="img/logo.png" alt="Logo StarBucks">

    <div class="circulo"></div>

    <div class="conteudo">

        <div class="caixa-texto">

            <h1>It's not just Coffee It's <span>Starbucks</span></h1>

            <p>
                Lorem ipsum dolor, sit amet consectetur adipisicing elit.
                Accusantium quaerat nulla dolore repellat! Cupiditate
                asperiores ipsa qui iure exercitationem, aperiam id
                debitis magnam eveniet. Esse porro nam perferendis
                tenetur distinctio?
            </p>

            <button>Clique para Entrar</button>

        </div>

        <div class="caixa-imagem">

            <img class="copao" src="img/img1.png" alt="imagem-copo-starbucks">

        </div>

    </div>

    <div class="menu">

        <img
            class="botao-menu"
            src="img/thumb1.png"
            alt="imagem-copinho-starbucks"
            onclick="trocaImagem('img/img1.png'); trocaFundo('#017143')"
        >

        <img
            class="botao-menu"
            src="img/thumb2.png"
            alt="imagem-copinho2-starbucks"
            onclick="trocaImagem('img/img2.png'); trocaFundo('#eb7495')"
        >

        <img
            class="botao-menu"
            src="img/thumb3.png"
            alt="imagem-copinho3-starbucks"
            onclick="trocaImagem('img/img3.png'); trocaFundo('#d752b1')"
        >

    </div>

</body>

<script src="script.js">

</script>

</html>
